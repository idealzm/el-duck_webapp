<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успешна</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #111111;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease-out;
        }
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #00d4aa 0%, #00a896 100%);
            color: #000;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 0.5px solid #4a4a4a;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 170, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .loading {
            display: none;
            font-size: 14px;
            color: #888;
            margin-top: 20px;
        }
        .loading.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Оплата успешна!</h1>
        <p id="message">Средства зачислены на ваш счёт</p>
        <button class="btn" onclick="returnToApp()">Вернуться в приложение</button>
        <p class="loading" id="loading">Перенаправление...</p>
    </div>

    <script>
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

        // Get params from URL
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('paymentId');
        const status = urlParams.get('status');
        const type = urlParams.get('type');

        // Update UI based on status
        const successIcon = document.querySelector('.success-icon');
        const title = document.querySelector('h1');
        const message = document.getElementById('message');

        if (status === 'success') {
            successIcon.textContent = '✅';
            if (type === 'subscription') {
                title.textContent = 'Подписка активирована!';
                message.textContent = 'Ваша подписка успешно оформлена на 30 дней';
            } else {
                title.textContent = 'Оплата успешна!';
                message.textContent = 'Средства зачислены на ваш счёт';
            }
        } else if (status === 'pending') {
            successIcon.textContent = '⏳';
            if (type === 'subscription') {
                title.textContent = 'Обработка платежа';
                message.textContent = 'Подписка будет активирована после подтверждения платежа.';
            } else {
                title.textContent = 'Обработка платежа';
                message.textContent = 'Платёж ещё обрабатывается. Пожалуйста, подождите.';
            }
        } else {
            successIcon.textContent = '⚠️';
            title.textContent = 'Статус уточняется';
            message.textContent = 'Если средства были списаны, они скоро поступят на счёт';
        }

        function returnToApp() {
            const loading = document.getElementById('loading');
            if (loading) loading.classList.add('active');

            // Если открыто в Telegram - закрываем
            if (tg && tg.close && typeof tg.close === 'function') {
                setTimeout(() => {
                    tg.close();
                }, 500);
            } else {
                // Если в браузере - редирект на основной сайт
                setTimeout(() => {
                    window.location.href = '/';
                }, 500);
            }
        }

        // Авто-возврат через 3 секунды
        setTimeout(() => {
            returnToApp();
        }, 3000);
    </script>
</body>
</html>
